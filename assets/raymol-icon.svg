<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img">
  <title>RayMol</title>
  <desc>RayMol app icon: a bold letter R over three crossed atomic p-orbitals on a sunset gradient tile.</desc>
  <defs>
    <linearGradient id="rm-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0185C"/>
      <stop offset="52%" stop-color="#F2542D"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="rm-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <g id="rm-porb">
      <path d="M100 100 C 78 72 78 30 100 14 C 122 30 122 72 100 100 Z"
            fill="#FFFFFF" fill-opacity="0.26" stroke="#FFFFFF" stroke-opacity="0.88" stroke-width="2.5"/>
      <path d="M100 100 C 78 128 78 170 100 186 C 122 170 122 128 100 100 Z"
            fill="#FFFFFF" fill-opacity="0.26" stroke="#FFFFFF" stroke-opacity="0.88" stroke-width="2.5"/>
    </g>
    <symbol id="rm-body" viewBox="0 0 200 200">
      <use href="#rm-porb" transform="rotate(0 100 100)"/>
      <use href="#rm-porb" transform="rotate(60 100 100)"/>
      <use href="#rm-porb" transform="rotate(120 100 100)"/>
      <text x="100" y="148" text-anchor="middle" paint-order="stroke"
            font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="800"
            font-size="148" fill="#FFFFFF" stroke="#5A0A24" stroke-width="5">R</text>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#rm-tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#rm-sheen)"/>
  <use href="#rm-body" x="0" y="0" width="1024" height="1024"/>
</svg>
