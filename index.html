function b2u(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function unlock(code){
  const blob=b2u(B64);
  const salt=blob.slice(0,16), iv=blob.slice(16,28), ct=blob.slice(28);
  const enc=new TextEncoder();
  const bk=await crypto.subtle.importKey('raw',enc.encode(code),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(pt);
}
async function submit(e){
  if(e) e.preventDefault();
  const code=document.getElementById('code').value.trim();
  const err=document.getElementById('err');
  err.textContent='';
  if(!code) return;
  try{
    const html=await unlock(code);
    try{ sessionStorage.setItem('rk',code); }catch(_){}
    document.open(); document.write(html); document.close();
  }catch(_){
    err.textContent='Incorrect code. Try again.';
    try{ sessionStorage.removeItem('rk'); }catch(_){}
  }
}
window.addEventListener('DOMContentLoaded',function(){
  // Web Crypto (crypto.subtle) only exists in a secure context (HTTPS or localhost).
  if(!window.isSecureContext || !(window.crypto && crypto.subtle)){
    document.getElementById('err').textContent='Secure connection required — open https://raymol.io (HTTPS is being set up).';
    document.getElementById('code').disabled=true;
    document.querySelector('button[type=submit]').disabled=true;
    return;
  }
  document.getElementById('f').addEventListener('submit',submit);
  var saved=null; try{ saved=sessionStorage.getItem('rk'); }catch(_){}
  if(saved){ document.getElementById('code').value=saved; submit(); }
});
</script>
